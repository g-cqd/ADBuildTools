name: "Setup Swift 6.4 (dev snapshot, macOS)"
description: >-
  Installs the pinned swift.org Swift 6.4 development-snapshot toolchain on a macOS runner and
  exports TOOLCHAINS so swift / swiftpm / xcodebuild resolve it. Needed because NO hosted macOS
  image ships Swift 6.4: macos-15 defaults to Xcode 16.4 (Swift 6.1.2) and macos-26 tops out at
  Xcode 26.6 (Swift 6.3.3) — Xcode 27 beta (Swift 6.4) is on no image (actions/runner-images
  manifests, checked 2026-07-02) — while every g-cqd package is swift-tools-version 6.4.
  This is the macOS analogue of the family's pinned Linux nightly container: a DATED snapshot,
  bumped deliberately like a dependency (not a moving "latest") so CI stays reproducible.
inputs:
  snapshot:
    description: >-
      swift.org swift-6.4.x-branch snapshot name. Default: the newest snapshot with a published
      osx pkg at the time of pinning. Keep roughly in step with the Linux container pin in
      swift-quality.yml when bumping.
    required: false
    default: "swift-6.4.x-DEVELOPMENT-SNAPSHOT-2026-06-15-a"
runs:
  using: composite
  steps:
    - name: Install ${{ inputs.snapshot }} and export TOOLCHAINS
      shell: bash
      run: |
        set -euo pipefail
        SNAP="${{ inputs.snapshot }}"
        TC_DIR="/Library/Developer/Toolchains/${SNAP}.xctoolchain"
        if [ ! -d "$TC_DIR" ]; then
          echo "Downloading ${SNAP}-osx.pkg …"
          curl -fsSL --retry 3 -o "${RUNNER_TEMP}/${SNAP}-osx.pkg" \
            "https://download.swift.org/swift-6.4.x-branch/xcode/${SNAP}/${SNAP}-osx.pkg"
          sudo installer -pkg "${RUNNER_TEMP}/${SNAP}-osx.pkg" -target /
          rm -f "${RUNNER_TEMP}/${SNAP}-osx.pkg"
        fi
        TOOLCHAIN_ID="$(plutil -extract CFBundleIdentifier raw "${TC_DIR}/Info.plist")"
        echo "TOOLCHAINS=${TOOLCHAIN_ID}" >> "$GITHUB_ENV"
        echo "Installed toolchain: ${TOOLCHAIN_ID}"
        TOOLCHAINS="${TOOLCHAIN_ID}" swift --version
